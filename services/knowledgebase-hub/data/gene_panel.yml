    - channelopathy
    - metabolic
    name: ATP binding cassette subfamily C member 8 (SUR1, sulfonylurea receptor)
    phenotypes:
    - Hiperinsulinismo congénito (CHI) — forma más común
    - Hipoglucemia neonatal grave refractaria
    - Lesión cerebral por hipoglucemia si no tratado
    - GoF raramente → neonatal diabetes (DEND syndrome)
    sources:
    - id: '600509'
      type: omim
    symbol: ABCC8
    treatable:
      category: small_molecule
      database:
      - TreatableID
      - Treatabolome
      status: 'yes'
      treatment:
      - Diazóxido
      - Octreotide
      - Glucagón en crisis agudas
      - Pancreatectomía focal/subtotal si refractario
      - Glucosa IV continua
