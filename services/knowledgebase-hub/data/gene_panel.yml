    - criterion: PM3
      note: Compound het en CHI difuso AR
    - criterion: PP4
      note: CHI grave neonatal + hiperinsulinismo documentado + respuesta a diazóxido
    clingen:
      dosage: ''
      gene_validity: Definitive
    clinical_labels:
