    - critical: true
      name: PLP-dependent aminotransferase domain
      notes: Cataboliza GABA → semialdehído succínico; LoF → acúmulo GABA (paradójicamente
        causa epilepsia por exceso crónico)
    mechanism:
    - loss_of_function
    mechanism_groups:
    - gaba_metabolism
    - nt_catabolism
    - metabolic
    name: 4-aminobutyrate aminotransferase (GABA transaminase)
    phenotypes:
    - Deficiencia de GABA transaminasa (rarísima, ~20 casos)
    - Encefalopatía neonatal grave + hiperekplexia + aceleración del crecimiento
    - GABA muy elevado en LCR y plasma
    - Leucodistrofia progresiva
    sources:
    - id: '613163'
      type: omim
    symbol: ABAT
    treatable:
      category: symptomatic
      database: []
      status: 'no'
      treatment:
      - Sin tratamiento específico
      - Antiepilépticos de soporte
      urgency: monitoring
    uniprot: P80404
    omim_code: '137150'
  ABCC8:
