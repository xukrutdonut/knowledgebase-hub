    - 'Forma difusa (bialélica): pancreatectomía subtotal si diazóxido no responde'
    - PET F-DOPA diferencia forma focal de difusa — guía cirugía
    - ⚠️ Hipoglucemia neonatal grave sin tratamiento → lesión cerebral irreversible
      (urgente)
    key_domains:
    - critical: true
      name: SUR1 subunit (ABC transporter)
      notes: Regula canal KATP (con KCNJ11/Kir6.2); LoF → canal permanentemente cerrado
