<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-label="Enfermedades Lisosomales — Degradación Celular" preserveAspectRatio="xMidYMid meet" width="100%" height="auto">
  <title>Enfermedades Lisosomales — Degradación Lisosomal</title>
  <desc>Alteraciones en enzimas lisosomales que afectan la degradación de lípidos, carbohidratos y proteínas</desc>
  <defs>
    <marker id="arrowBlue" markerWidth="3" markerHeight="3" refX="2.5" refY="1.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L3,1.5 L0,3 z" fill="#6c8fff"/></marker>
    <marker id="arrowGreen" markerWidth="3" markerHeight="3" refX="2.5" refY="1.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L3,1.5 L0,3 z" fill="#34d399"/></marker>
    <marker id="arrowRed" markerWidth="3" markerHeight="3" refX="2.5" refY="1.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L3,1.5 L0,3 z" fill="#f87171"/></marker>
    <marker id="arrowOrange" markerWidth="3" markerHeight="3" refX="2.5" refY="1.5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L3,1.5 L0,3 z" fill="#fb923c"/></marker>
    <radialGradient id="lysoGrad" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#6d28d9"/></radialGradient>
    <linearGradient id="panelGlow" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1d2236"/><stop offset="100%" stop-color="#131724"/></linearGradient>
    <style>
      text { font-family: Inter, system-ui, sans-serif; }
      @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
    </style>
  </defs>
  <rect x="0" y="0" width="900" height="520" fill="#0f1117"/>
  <text x="36" y="42" font-size="26" font-weight="800" fill="#f8fafc" text-anchor="start">Enfermedades Lisosomales — Degradación Celular</text>
  <text x="36" y="67" font-size="13" font-weight="500" fill="#94a3b8" text-anchor="start">Deficiencia enzimática · Acumulación de sustratos · Esfingolipidosis, mucolipidosis</text>
  
  <!-- Main pathway panel -->
  <rect x="34" y="84" width="832" height="398" rx="12" fill="url(#panelGlow)" stroke="#2e3250" stroke-width="1"/>
  
  <!-- Lysosome organelle -->
  <circle cx="150" cy="200" r="50" fill="url(#lysoGrad)" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="150" y="195" font-size="11" font-weight="700" fill="#f8fafc" text-anchor="middle">LISOSOMA</text>
  <text x="150" y="210" font-size="9" font-weight="500" fill="#ede9fe" text-anchor="middle">pH 4.5-5.0</text>
  
  <!-- Substrate entry arrows -->
  <line x1="100" y1="160" x2="120" y2="165" stroke="#6c8fff" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
  <line x1="110" y1="140" x2="130" y2="155" stroke="#6c8fff" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
  
  <!-- Substrate labels -->
  <text x="85" y="150" font-size="9" font-weight="700" fill="#6c8fff">Lípidos</text>
  <text x="80" y="130" font-size="9" font-weight="700" fill="#6c8fff">Proteínas</text>
  <text x="200" y="130" font-size="9" font-weight="700" fill="#34d399">Carbohidratos</text>
  
  <!-- Main degradation pathways -->
  <!-- Sphingolipid pathway -->
  <g>
    <rect x="280" y="155" width="80" height="28" rx="6" fill="#f87171" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
    <text x="320" y="175" font-size="10" font-weight="700" fill="#f8fafc" text-anchor="middle">Esfingolípidos</text>
  </g>
  <line x1="200" y1="169" x2="280" y2="169" stroke="#a78bfa" stroke-width="1.2" marker-end="url(#arrowRed)"/>
  
  <!-- Acid hydrolases -->
  <rect x="280" y="200" width="80" height="28" rx="6" fill="#34d399" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <text x="320" y="220" font-size="10" font-weight="700" fill="#f8fafc" text-anchor="middle">Hidrolasas</text>
  
  <!-- Downstream products -->
  <g>
    <line x1="360" y1="169" x2="420" y2="169" stroke="#f87171" stroke-width="1.2" marker-end="url(#arrowRed)"/>
    <rect x="420" y="155" width="80" height="28" rx="6" fill="#a78bfa" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
    <text x="460" y="175" font-size="9" font-weight="700" fill="#f8fafc" text-anchor="middle">Ceramida</text>
  </g>
  
  <g>
    <line x1="360" y1="214" x2="420" y2="214" stroke="#34d399" stroke-width="1.2" marker-end="url(#arrowGreen)"/>
    <rect x="420" y="200" width="80" height="28" rx="6" fill="#fb923c" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
    <text x="460" y="220" font-size="9" font-weight="700" fill="#f8fafc" text-anchor="middle">Monosac.</text>
  </g>
  
  <!-- Accumulation in disease -->
  <line x1="500" y1="169" x2="560" y2="169" stroke="#f87171" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#arrowRed)"/>
  <rect x="560" y="140" width="100" height="60" rx="6" fill="#1f2937" stroke="#f87171" stroke-width="1"/>
  <text x="610" y="160" font-size="10" font-weight="700" fill="#fca5a5" text-anchor="middle">ACUMULACIÓN</text>
  <text x="610" y="178" font-size="9" font-weight="500" fill="#94a3b8" text-anchor="middle">Sustratos no</text>
  <text x="610" y="190" font-size="9" font-weight="500" fill="#94a3b8" text-anchor="middle">degradados</text>
  
  <!-- Clinical consequences -->
  <rect x="80" y="300" width="700" height="55" rx="8" fill="rgba(248,113,113,0.1)" stroke="#f87171" stroke-width="1"/>
  <text x="100" y="320" font-size="10" font-weight="700" fill="#fca5a5">Consecuencias neurológicas:</text>
  <text x="100" y="340" font-size="9" font-weight="500" fill="#94a3b8">• Neurodegeneración • Hepatosplenomegalia • Esqueleto anormal • Discapacidad progresiva • Muerte prematura</text>
  
  <!-- Major lysosomal storage diseases -->
  <rect x="80" y="375" width="700" height="50" rx="8" fill="rgba(99,102,241,0.1)" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="100" y="393" font-size="10" font-weight="700" fill="#818cf8">Enfermedades principales:</text>
  <text x="100" y="411" font-size="9" font-weight="500" fill="#94a3b8">Niemann-Pick (SMPD1) • Gaucher (GBA) • Fabry (GLA) • Pompe (GAA) • I-cell (GNPTAB) • Galactosialidosis</text>
  
  <!-- Footer -->
  <text x="450" y="475" font-size="11" font-weight="500" fill="#64748b" text-anchor="middle">Haz clic en genes subrayados para más información clínica</text>
</svg>
