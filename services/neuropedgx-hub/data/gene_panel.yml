genes:
  SCN1A:
    symbol: SCN1A
    name: Sodium voltage-gated channel alpha subunit 1
    hgnc_id: 10585
    uniprot: P35498
    mechanism_groups:
    - channelopathy
    - dee
    clinical_labels:
    - dee
    - epilepsy
    mechanism:
    - loss_of_function
    - haploinsufficiency
    inheritance:
    - AD
    - de_novo
    phenotypes:
    - Dravet syndrome (OMIM 607208)
    - GEFS+ (OMIM 604233)
    - Febrile seizures
    key_domains:
    - name: Voltage sensor S4 (DI)
      critical: true
      notes: GoF variants aquí → fenotipo más leve (GEFS+)
    - name: Pore loop (DIII-DIV)
      critical: true
      notes: LoF variants → Dravet
    - name: C-terminal domain
      critical: false
      notes: Variants here often milder
    hotspots:
    - hgvs_p: p.Arg1648His
      significance: Pathogenic
      phenotype: GEFS+
      pmid: 10612706
    - hgvs_p: p.Arg1648Cys
      significance: Pathogenic
      phenotype: Dravet
      pmid: 11528394
    interpretation_notes:
    - Haploinsufficiencia bien establecida (pLI=1.0, gnomAD o/e LoF=0.06)
    - 'CRÍTICO: diferenciar GoF (GEFS+, fenotipo leve) de LoF (Dravet, grave)'
    - PS2 altamente relevante — 90% de Dravet son de novo
    - 'Cuidado con variantes missense: no todas son patogénicas; consultar ClinGen/LOVD'
    - 'Portadores maternos de variantes truncantes: posible mosaicismo materno'
    acmg_guidance:
    - criterion: PS2
      note: De novo muy relevante; confirmar parentesco
    - criterion: PM2
      note: Esperada frecuencia muy baja (gnomAD constraint severo)
    - criterion: PP2
      note: Gen de alta restricción missense — aplica
    - criterion: BS2
      note: 'Cuidado: portadores sanos no excluyen GEFS+ de penetrancia variable'
    clingen:
      gene_validity: Definitive
      dosage: Haploinsufficiency (3 — sufficient)
    sources:
    - type: ClinGen
      url: https://clinicalgenome.org/gene-validity/SCN1A
    - type: PMID
      id: 32860012
    - type: PMID
      id: 11528394
  SCN2A:
    symbol: SCN2A
    name: Sodium voltage-gated channel alpha subunit 2
    hgnc_id: 10588
    uniprot: Q99250
    mechanism_groups:
    - channelopathy
    - dee
