    - DEE11 — Ohtahara/West syndrome (GoF, neonatal onset)
    - Autism/NDD (LoF, later onset)
    - Benign familial neonatal-infantile seizures
    key_domains:
    - name: Voltage sensor S4
      critical: true
      notes: GoF early onset epilepsy
    - name: Pore region
      critical: true
      notes: LoF → ASD/NDD
    interpretation_notes:
    - 'CRÍTICO: onset age predicts mechanism — neonatal/infantile = GoF; >2 años = LoF'
    - GoF responde a bloqueadores Na (carbamazepina, fenitoína); LoF NO
    - Implicaciones terapéuticas directas del mecanismo
    acmg_guidance:
    - criterion: PS2
      note: De novo esperado en GoF/DEE grave
    - criterion: PS4
      note: Prevalencia alta en DEE neonatal
    clingen:
      gene_validity: Definitive
    sources:
    - type: PMID
      id: 28640232
    - type: PMID
      id: 27824329
  SCN8A:
    symbol: SCN8A
    name: Sodium voltage-gated channel alpha subunit 8
    hgnc_id: 10596
    uniprot: Q9UQD0
