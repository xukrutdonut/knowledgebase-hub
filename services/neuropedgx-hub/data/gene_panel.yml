      significance: Pathogenic
      phenotype: Wilson disease, forma hepática, Asia oriental
      pmid: '12454772'
    interpretation_notes:
    - 'TRATABLE: penicilamina o trientina + zinc (quelantes de cobre) — inicio precoz previene progresión neurológica'
    - 'Diagnóstico bioquímico: ceruloplasmina ↓, cobre urinario ↑, cobre hepático ↑'
    - 'Anillo de Kayser-Fleischer en lámpara de hendidura: casi patognomónico en forma neurológica'
    - ⚠️ Puede presentarse como psicosis o comportamiento anormal en adolescente — excluir Wilson siempre
    - Trasplante hepático en fallo hepático agudo (no indicado para forma neurológica pura)
    - Cribado familiar obligatorio en hermanos
    acmg_guidance:
    - criterion: PM3
