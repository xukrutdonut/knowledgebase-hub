      phenotype: DEE7
      pmid: 22961000
    interpretation_notes:
    - 'CRÍTICO: diferenciar forma grave (de novo, poro/S4) de forma leve familiar (AD)'
    - Forma grave responde a bloqueantes de canal AMPA (retigabina/ezogabina) o fenitoína
    - 'Variantes de novo en poro: mayor probabilidad de patogenicidad grave'
    acmg_guidance:
    - criterion: PM2
      note: Esperada muy baja frecuencia en DEE
    - criterion: PS2
      note: De novo en DEE neonatal grave
    clingen:
      gene_validity: Definitive
    sources:
    - type: PMID
