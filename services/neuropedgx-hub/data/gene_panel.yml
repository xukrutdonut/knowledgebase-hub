    - dna_repair
    clinical_labels:
    - interferonopathy
    - leukodystrophy_phenotype
    - intellectual_disability
    mechanism:
    - loss_of_function
    inheritance:
    - AR
    phenotypes:
    - Aicardi-Goutières syndrome type 4 (AGS4)
    - Encefalopatía progresiva neonatal/infantil con leucodistrofia y calcificaciones de ganglios basales
    - Espasticidad, microcefalia y chilblains/sabañones
    - 'LCR: interferón elevado y neopterina elevada'
    symptoms:
    - calcificaciones
    - leucodistrofia
    - encefalopatia
    - chilblains
    key_domains:
    - name: RNase H2 catalytic domain
      critical: true
      notes: Subunidad catalítica del complejo RNASEH2; degrada híbridos RNA:DNA y ribonucleótidos insertados en DNA.
    hotspots: []
    interpretation_notes:
    - Aicardi-Goutières debe sospecharse en toda leucodistrofia con calcificaciones.
    - LCR con interferón elevado es altamente orientador; los chilblains son una pista clínica muy fuerte.
    - La pérdida de función favorece acumulación de R-loops y activación cGAS-STING con tormenta de interferón.
    - Baricitinib o ruxolitinib han mostrado mejoría clínica en casos seleccionados.
    acmg_guidance:
    - criterion: PM3
      note: Enfermedad autosómica recesiva; buscar variantes bialélicas en trans.
    - criterion: PP4
      note: Leucodistrofia/calcificaciones + firma de interferón o LCR IFN elevado apoyan fuertemente el diagnóstico.
    treatable:
      status: partial
      category: small_molecule
      urgency: standard
      treatment:
